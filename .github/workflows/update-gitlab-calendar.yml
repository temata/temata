name: Update GitLab Contribution Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate calendar SVG
        run: npm run generate:gitlab-calendar
        env:
          GITLAB_CALENDAR_URL: ${{ secrets.GITLAB_CALENDAR_URL }}

      - name: Commit and push changes
        run: |
          if [[ -z "$(git status --porcelain assets/gitlab-contributions.svg assets/gitlab-contributions-dark.svg)" ]]; then
            echo "No calendar changes"
            exit 0
          fi

          git config user.name "temata"
          git config user.email "thereserayemata@gmail.com"
          git add assets/gitlab-contributions.svg assets/gitlab-contributions-dark.svg
          git commit -m "chore(readme): update GitLab contribution calendar"
          git push
